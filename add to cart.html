<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Add to Cart</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background-color: #ffe6f0;
        margin: 0;
        padding: 0;
    }
    h1 {
        text-align: center;
        color: #d63384;
        margin: 20px 0;
    }
    table {
        width: 90%;
        margin: auto;
        border-collapse: collapse;
        background: white;
        border-radius: 15px;
        overflow: hidden;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
    }
    th, td {
        padding: 15px;
        text-align: center;
        border-bottom: 1px solid #ffe6f0;
    }
    th {
        background-color: #ff4da6;
        color: white;
    }
    td img {
        width: 80px;
        border-radius: 10px;
    }
    .remove-btn {
        background-color: #ff4da6;
        color: white;
        padding: 8px 12px;
        border: none;
        border-radius: 5px;
        cursor: pointer;
    }
    .remove-btn:hover {
        background-color: #d63384;
    }
    .checkout {
        display: block;
        width: 200px;
        margin: 20px auto;
        background-color: #ff4da6;
        color: white;
        padding: 10px;
        border-radius: 25px;
        text-align: center;
        text-decoration: none;
        font-weight: bold;
    }
    .checkout:hover {
        background-color: #d63384;
    }
</style>
</head>
<body>

<h1>Your Cart</h1>
<table>
    <tr>
        <th>Product</th>
        <th>Details</th>
        <th>Price</th>
        <th>Quantity</th>
        <th>Action</th>
    </tr>
    <tr>
        <td><img src="kurta img.1.webp" alt="Kurta 1"></td>
        <td>Floral Printed Kurta<br>Size: M<br>Color: Pink</td>
        <td>₹1,199</td>
        <td><input type="number" value="1" min="1" style="width:50px;"></td>
        <td><button class="remove-btn">Remove</button></td>
    </tr>
</table>

<a href="payment.html" class="checkout">Proceed to Payment</a>

</body>
</html>
