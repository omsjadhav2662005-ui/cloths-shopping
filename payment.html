<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payment Page</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background-color: #ffe6f0;
        margin: 0;
        padding: 0;
    }
    .container {
        max-width: 500px;
        margin: 50px auto;
        background: #fff;
        padding: 20px;
        border-radius: 12px;
        box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
    }
    h2 {
        text-align: center;
        color: #d63384;
    }
    label {
        display: block;
        margin-top: 15px;
        font-weight: bold;
        color: #444;
    }
    select, input {
        width: 100%;
        padding: 10px;
        margin-top: 5px;
        border-radius: 6px;
        border: 1px solid #ccc;
    }
    .upi-options {
        display: none;
        margin-top: 10px;
    }
    .upi-option {
        display: flex;
        align-items: center;
        padding: 8px;
        border: 1px solid #ddd;
        margin-top: 5px;
        border-radius: 6px;
        cursor: pointer;
        transition: background 0.2s;
    }
    .upi-option:hover {
        background: #ffe6f0;
    }
    .upi-option img {
        width: 30px;
        height: 30px;
        margin-right: 10px;
    }
    button {
        background: #d63384;
        color: white;
        padding: 12px;
        border: none;
        border-radius: 6px;
        margin-top: 20px;
        width: 100%;
        cursor: pointer;
        font-size: 16px;
    }
    button:hover {
        background: #b52a6f;
    }
</style>
</head>
<body>

<div class="container">
    <h2>Payment</h2>
    <label for="paymentMethod">Select Payment Method</label>
    <select id="paymentMethod">
        <option value="">-- Select --</option>
        <option value="card">Card Payment</option>
        <option value="upi">UPI Payment</option>
    </select>

    <!-- Card Payment Fields -->
    <div id="cardFields" style="display:none;">
        <label>Card Number</label>
        <input type="text" placeholder="1234 5678 9012 3456">
        <label>Expiry Date</label>
        <input type="text" placeholder="MM/YY">
        <label>CVV</label>
        <input type="password" placeholder="***">
    </div>

    <!-- UPI Payment Fields -->
    <div id="upiFields" class="upi-options">
        <div class="upi-option"><img src="google-pay.png">Google Pay</div>
        <div class="upi-option"><img src="PhonePe.png">PhonePe</div>
        <div class="upi-option"><img src="paytm.png">Paytm</div>
       <!---- <div class="upi-option"><img src="https://upload.wikimedia.org/wikipedia/commons/7/7e/BHIM_logo.svg">BHIM</div>-->
    </div>

    <button>Proceed to Pay</button>
</div>

<script>
    document.getElementById("paymentMethod").addEventListener("change", function() {
        let method = this.value;
        document.getElementById("cardFields").style.display = (method === "card") ? "block" : "none";
        document.getElementById("upiFields").style.display = (method === "upi") ? "block" : "none";
    });
</script>

</body>
</html>
