<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Joggers Collection - Reference Template</title>

<style>
body{
  font-family:'Segoe UI',Arial;
  background:#ffe6f0;
  margin:0;
  color:#333;
}

.header{
  background:#ff4da6;
  color:white;
  padding:15px 30px;
  font-size:22px;
  font-weight:bold;
  text-align:center;
}

/* COLLECTION PAGE */

.product-section{
  max-width:1200px;
  margin:30px auto;
  padding:0 20px;
}

.controls{
  display:flex;
  justify-content:space-between;
  margin-bottom:25px;
  gap:10px;
  flex-wrap:wrap;
}

select{
  padding:10px 14px;
  border-radius:25px;
  border:2px solid #ff4da6;
  background:white;
  color:#b30059;
  font-weight:600;
  cursor:pointer;
  outline:none;
}

.product-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
  gap:25px;
}

.product-card{
  background:white;
  border-radius:15px;
  box-shadow:0 4px 15px rgba(0,0,0,0.08);
  padding:15px;
  cursor:pointer;
  transition:.3s;
}

.product-card:hover{
  transform:translateY(-6px);
  box-shadow:0 8px 20px rgba(0,0,0,0.15);
}

.product-card img{
  width:100%;
  border-radius:12px;
}

.product-name{
  font-weight:600;
  margin-top:10px;
  color:#b30059;
}

.product-price{
  color:#ff4da6;
  font-weight:bold;
  margin-top:5px;
}

/* PRODUCT VIEW */

#productView{
  display:none;
  max-width:1100px;
  margin:40px auto;
  background:white;
  padding:35px;
  border-radius:18px;
  box-shadow:0 8px 25px rgba(0,0,0,0.1);
}

.product-container{
  display:flex;
  flex-wrap:wrap;
  gap:40px;
  align-items:center;
}

#productView img{
  width:380px;
  border-radius:15px;
  box-shadow:0 4px 15px rgba(0,0,0,0.15);
}

.details{flex:1;}

.details h1{color:#b30059;}

.price{
  font-size:28px;
  color:#ff4da6;
  font-weight:bold;
  margin:15px 0;
}

.sizes button{
  border:1px solid #ccc;
  background:white;
  padding:10px 15px;
  margin-right:10px;
  border-radius:8px;
  cursor:pointer;
}

.sizes button.active{
  border-color:#ff4da6;
  color:#ff4da6;
  font-weight:bold;
}

.actions{margin-top:25px;}

.btn{
  background:#ff4da6;
  color:white;
  padding:14px 28px;
  border:none;
  border-radius:30px;
  font-size:16px;
  cursor:pointer;
  margin-right:15px;
}

.btn:hover{background:#d63384;}

.back{
  background:#e0e0e0;
  color:#333;
  margin-bottom:20px;
}
</style>
</head>

<body>

<div class="header">Joggers Collection</div>

<div class="product-section" id="collection">

  <!-- FILTER + SORT -->

  <div class="controls">

    <select id="filter" onchange="applyFilterSort()">
      <option value="all">All</option>
      <option value="cotton">Cotton</option>
      <option value="sports">Sports</option>
      <option value="track">Track</option>
    </select>

    <select id="sort" onchange="applyFilterSort()">
      <option value="latest">Sort By</option>
      <option value="low">Price: Low to High</option>
      <option value="high">Price: High to Low</option>
      <option value="az">Name: A to Z</option>
    </select>

  </div>

  <div class="product-grid" id="products"></div>

</div>

<!-- PRODUCT FULL VIEW -->

<div id="productView">

  <button class="btn back" onclick="goBack()">⬅ Back to Collection</button>

  <div class="product-container">

    <img id="pImg">

    <div class="details">
      <h1 id="pName"></h1>
      <p class="price" id="pPrice"></p>

      <h3>Select Size</h3>

      <div class="sizes">
        <button onclick="selectSize(this)">S</button>
        <button onclick="selectSize(this)">M</button>
        <button onclick="selectSize(this)">L</button>
        <button onclick="selectSize(this)">XL</button>
      </div>

      <div class="actions">
        <button class="btn" onclick="addToCart()">Add to Cart</button>
        <button class="btn" onclick="window.location='payment.html'">Buy Now</button>
      </div>

    </div>
  </div>
</div>

<script>

let productsData = [
  { name:"Cotton Comfort Joggers", price:1199, category:"cotton", img:"jo1.avif" },
  { name:"Sports Active Joggers", price:1499, category:"sports", img:"jo2.avif" },
  { name:"Track Fit Joggers", price:1699, category:"track", img:"jo3.avif" },
  { name:"Daily Wear Cotton Joggers", price:999, category:"cotton", img:"jo4.avif" },
  { name:"Gym Sports Joggers", price:1799, category:"sports", img:"jo5.avif" },
  { name:"Slim Track Joggers", price:1899, category:"track", img:"jo6.avif" },
  { name:"Relaxed Cotton Joggers", price:1099, category:"cotton", img:"jo7.avif" },
  { name:"Running Sports Joggers", price:1999, category:"sports", img:"jo8.avif" },
  { name:"Classic Track Joggers", price:1599, category:"track", img:"jo9.avif" },
  { name:"Everyday Cotton Joggers", price:1149, category:"cotton", img:"jo10.avif" },
  { name:"Performance Sports Joggers", price:2199, category:"sports", img:"jo11.avif" },
  { name:"Premium Track Joggers", price:2399, category:"track", img:"jo12.avif" }
];

const container = document.getElementById("products");

function renderProducts(data){
  container.innerHTML="";
  data.forEach((p,i)=>{
    container.innerHTML += `
      <div class="product-card" onclick="showProduct(${i})">
        <img src="${p.img}">
        <div class="product-name">${p.name}</div>
        <div class="product-price">₹${p.price}</div>
      </div>
    `;
  });
}

renderProducts(productsData);

/* FILTER + SORT */

function applyFilterSort(){

  let filtered = [...productsData];

  const f = filter.value;
  const s = sort.value;

  if(f !== "all")
    filtered = filtered.filter(p => p.category === f);

  if(s === "low") filtered.sort((a,b)=>a.price-b.price);
  if(s === "high") filtered.sort((a,b)=>b.price-a.price);
  if(s === "az") filtered.sort((a,b)=>a.name.localeCompare(b.name));

  renderProducts(filtered);
}

/* PRODUCT VIEW */

function showProduct(i){
  const p = productsData[i];

  collection.style.display="none";
  productView.style.display="block";

  pImg.src = p.img;
  pName.textContent = p.name;
  pPrice.textContent = "₹"+p.price;
}

function goBack(){
  productView.style.display="none";
  collection.style.display="block";
}

function selectSize(btn){
  document.querySelectorAll(".sizes button")
    .forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
}

function addToCart(){
  alert("Product added to cart ✅");
}

</script>

</body>
</html>
