<!-- search.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: hsl(336, 29%, 97%); /* Light pink background */
            margin: 0;
            padding: 0;
            color: #4a0033;
        }

        h2 {
            text-align: center;
            padding: 20px;
            background-color: #e04b95; /* Pink header */
            color: white;
            margin: 0;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        .search-box {
            max-width: 500px;
            margin: 30px auto;
            display: flex;
            gap: 0;
        }

        .search-box input {
            flex: 1;
            padding: 12px;
            font-size: 16px;
            border: 2px solid #ff66b2;
            border-radius: 25px 0 0 25px;
            outline: none;
        }

        .search-box button {
            padding: 12px 20px;
            background-color: #ff66b2;
            color: white;
            border: none;
            border-radius: 0 25px 25px 0;
            cursor: pointer;
            font-size: 16px;
        }

        .search-box button:hover {
            background-color: #e60073; /* Darker pink */
        }

        .search-results {
            max-width: 500px;
            margin: 20px auto;
            background: white;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

    <h2>Search</h2>
    <div class="search-box">
        <input type="text" placeholder="Search for products...">
        <button>Search</button>
    </div>

    <div class="search-results">
        <p>Results will appear here...</p>
    </div>

</body>
</html>
