<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Men Nehru Jacket Collection - Reference</title>

<style>
/* General styling */
body {
  font-family:'Segoe UI', Arial;
  background:#fff0f6;
  margin:0;
  color:#333;
}

/* Header */
.header {
  background:#ff4da6;
  color:white;
  padding:15px 30px;
  font-size:22px;
  font-weight:bold;
  text-align:center;
}

/* Product Section */
.product-section {
  max-width:1200px;
  margin:30px auto;
  padding:0 20px;
}

/* Sort Dropdown */
.sort-box {
  display:flex;
  justify-content:flex-end;
  margin-bottom:25px;
}

.sort-box select {
  padding:10px 14px;
  border-radius:25px;
  border:2px solid #ff4da6;
  background:white;
  color:#b30059;
  font-weight:600;
  cursor:pointer;
  outline:none;
  transition:.3s;
}

.sort-box select:hover {
  background:#fff0f6;
}

.sort-box select:focus {
  box-shadow:0 0 0 3px rgba(255,77,166,0.2);
}

/* Product Grid */
.product-grid {
  display:grid;
  grid-template-columns:repeat(auto-fit, minmax(240px,1fr));
  gap:25px;
}

.product-card {
  background:white;
  border-radius:15px;
  box-shadow:0 4px 15px rgba(0,0,0,0.08);
  padding:15px;
  cursor:pointer;
  transition:.3s;
}

.product-card:hover {
  transform:translateY(-6px);
  box-shadow:0 8px 20px rgba(0,0,0,0.15);
}

.product-card img {
  width:100%;
  border-radius:12px;
}

.product-name {
  font-weight:600;
  margin-top:10px;
  color:#b30059;
}

.product-price {
  color:#ff4da6;
  font-weight:bold;
  margin-top:5px;
}

/* Product View */
#productView {
  display:none;
  max-width:1100px;
  margin:40px auto;
  background:white;
  padding:35px;
  border-radius:18px;
  box-shadow:0 8px 25px rgba(0,0,0,0.1);
}

.product-container {
  display:flex;
  flex-wrap:wrap;
  gap:40px;
  align-items:center;
}

#productView img {
  width:380px;
  border-radius:15px;
  box-shadow:0 4px 15px rgba(0,0,0,0.15);
}

.details {
  flex:1;
}

.details h1 {
  color:#b30059;
}

.price {
  font-size:28px;
  color:#ff4da6;
  font-weight:bold;
  margin:15px 0;
}

/* Size buttons */
.sizes button {
  border:1px solid #ccc;
  background:white;
  padding:10px 15px;
  margin-right:10px;
  border-radius:8px;
  cursor:pointer;
}

.sizes button.active {
  border-color:#ff4da6;
  color:#ff4da6;
  font-weight:bold;
}

/* Action Buttons */
.actions {
  margin-top:25px;
}

.btn {
  background:#ff4da6;
  color:white;
  padding:14px 28px;
  border:none;
  border-radius:30px;
  font-size:16px;
  cursor:pointer;
  margin-right:15px;
}

.btn:hover {
  background:#d63384;
}

.back {
  background:#e0e0e0;
  color:#333;
  margin-bottom:20px;
}
</style>
</head>

<body>

<div class="header">Men Nehru Jacket Collection</div>

<div class="product-section" id="collection">

  <!-- Optional Sorting -->
  <div class="sort-box">
    <select onchange="sortProducts(this.value)">
      <option value="default">Sort By</option>
      <option value="low">Price: Low to High</option>
      <option value="high">Price: High to Low</option>
      <option value="az">Name: A to Z</option>
    </select>
  </div>

  <div class="product-grid" id="products"></div>
</div>

<!-- Product Full View -->
<div id="productView">
  <button class="btn back" onclick="goBack()">⬅ Back to Collection</button>

  <div class="product-container">
    <img id="pImg">
    <div class="details">
      <h1 id="pName"></h1>
      <p class="price" id="pPrice"></p>

      <h3>Select Size</h3>
      <div class="sizes">
        <button onclick="selectSize(this)">S</button>
        <button onclick="selectSize(this)">M</button>
        <button onclick="selectSize(this)">L</button>
        <button onclick="selectSize(this)">XL</button>
        <button onclick="selectSize(this)">XXL</button>
      </div>

      <div class="actions">
        <button class="btn" onclick="addToCart()">Add to Cart</button>
        <button class="btn" onclick="window.location='payment.html'">Buy Now</button>
      </div>
    </div>
  </div>
</div>

<script>
// Product Data
let productsData = [
  { name:"Classic Silk Nehru Jacket", price:2499, img:"nehru1.avif" },
  { name:"Printed Festive Jacket", price:2799, img:"nehru2.avif" },
  { name:"Wedding Designer Jacket", price:3299, img:"nehru3.avif" },
  { name:"Cotton Casual Nehru Jacket", price:1999, img:"nehru4.avif" },
  { name:"Embroidered Ethnic Jacket", price:3599, img:"nehru5.avif" },
  { name:"Linen Summer Jacket", price:2199, img:"nehru6.avif" },
  { name:"Velvet Party Jacket", price:3999, img:"nehru7.avif" },
  { name:"Indo-Western Jacket", price:2999, img:"nehru8.avif" },
  { name:"Pastel Wedding Jacket", price:3499, img:"nehru9.avif" },
  { name:"Designer Mirror Work Jacket", price:3799, img:"nehru10.avif" },
  { name:"Royal Brocade Jacket", price:4299, img:"nehru11.avif" },
  { name:"Premium Groom Jacket", price:4599, img:"nehru12.avif" }
];

// Render Products
const container = document.getElementById("products");
function renderProducts(data) {
  container.innerHTML = "";
  data.forEach((p, i) => {
    container.innerHTML += `
      <div class="product-card" onclick="showProduct(${i})">
        <img src="${p.img}">
        <div class="product-name">${p.name}</div>
        <div class="product-price">₹${p.price}</div>
      </div>
    `;
  });
}

renderProducts(productsData);

// Sorting Function
function sortProducts(type) {
  let sorted = [...productsData];
  if(type === "low") sorted.sort((a,b) => a.price - b.price);
  else if(type === "high") sorted.sort((a,b) => b.price - a.price);
  else if(type === "az") sorted.sort((a,b) => a.name.localeCompare(b.name));
  renderProducts(sorted);
}

// Show Product
function showProduct(i) {
  const p = productsData[i];
  collection.style.display = "none";
  productView.style.display = "block";
  pImg.src = p.img;
  pName.textContent = p.name;
  pPrice.textContent = "₹"+p.price;
}

// Back to Collection
function goBack() {
  productView.style.display = "none";
  collection.style.display = "block";
}

// Select Size
function selectSize(btn) {
  document.querySelectorAll(".sizes button").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
}

// Add to Cart
function addToCart() {
  alert("Product added to cart ✅");
}
</script>

</body>
</html>
